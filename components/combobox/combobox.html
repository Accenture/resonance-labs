<section>
  <label id="cbx-label" for="cbx-input">City</label>
  <div class="rl-combobox-wrapper">
    <input
      id="cbx-input"
      class="rl-combobox"
      type="text"
      role="combobox"
      aria-haspopup="listbox"
      aria-labelledby="cbx-label"
      aria-controls="cbx-listbox"
      aria-expanded="false"
      aria-describedby="cbx-hint"
      autocomplete="off"
      data-cbx="input"
    />
    <div
      id="cbx-listbox"
      class="rl-listbox"
      role="listbox"
      aria-labelledby="cbx-label"
      hidden
      data-cbx="listbox"
    ></div>
  </div>
  <div class="rl-hint" id="cbx-hint" data-cbx="hint">Type to filter, or press Arrow Down to open.</div>
</section>
