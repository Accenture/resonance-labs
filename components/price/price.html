<div class="rlb-price-examples">
  <!-- Standard price -->
  <div class="rlb-price-card">
    <h3 class="rlb-price-card__title">Pro Plan</h3>
    <p class="rlb-price">
      <span class="rlb-sr-only">Price:</span>
      <span class="rlb-price__amount">$49.99</span>
      <span class="rlb-sr-only">USD</span>
    </p>
  </div>

  <!-- Price range -->
  <div class="rlb-price-card">
    <h3 class="rlb-price-card__title">Custom Widget</h3>
    <p class="rlb-price">
      <span class="rlb-sr-only">Price range:</span>
      <span class="rlb-price__amount">$10.00</span>
      <span class="rlb-price__separator" aria-hidden="true">&ndash;</span>
      <span class="rlb-sr-only">to</span>
      <span class="rlb-price__amount">$25.00</span>
      <span class="rlb-sr-only">USD</span>
    </p>
  </div>

  <!-- Free item -->
  <div class="rlb-price-card">
    <h3 class="rlb-price-card__title">Starter Plan</h3>
    <p class="rlb-price">
      <span class="rlb-sr-only">Price:</span>
      <span class="rlb-price__amount rlb-price__amount--free">Free</span>
    </p>
  </div>

  <!-- Price with explicit currency code -->
  <div class="rlb-price-card">
    <h3 class="rlb-price-card__title">Enterprise Plan</h3>
    <p class="rlb-price">
      <span class="rlb-sr-only">Price:</span>
      <span class="rlb-price__amount">
        <span class="rlb-price__currency">EUR</span>
        89.00
      </span>
    </p>
  </div>
</div>
