<div class="rl-price-examples">
  <!-- Standard price -->
  <div class="rl-price-card">
    <h3 class="rl-price-card__title">Pro Plan</h3>
    <p class="rl-price">
      <span class="rl-sr-only">Price:</span>
      <span class="rl-price__amount">$49.99</span>
      <span class="rl-sr-only">USD</span>
    </p>
  </div>

  <!-- Price range -->
  <div class="rl-price-card">
    <h3 class="rl-price-card__title">Custom Widget</h3>
    <p class="rl-price">
      <span class="rl-sr-only">Price range:</span>
      <span class="rl-price__amount">$10.00</span>
      <span class="rl-price__separator" aria-hidden="true">&ndash;</span>
      <span class="rl-sr-only">to</span>
      <span class="rl-price__amount">$25.00</span>
      <span class="rl-sr-only">USD</span>
    </p>
  </div>

  <!-- Free item -->
  <div class="rl-price-card">
    <h3 class="rl-price-card__title">Starter Plan</h3>
    <p class="rl-price">
      <span class="rl-sr-only">Price:</span>
      <span class="rl-price__amount rl-price__amount--free">Free</span>
    </p>
  </div>

  <!-- Price with explicit currency code -->
  <div class="rl-price-card">
    <h3 class="rl-price-card__title">Enterprise Plan</h3>
    <p class="rl-price">
      <span class="rl-sr-only">Price:</span>
      <span class="rl-price__amount">
        <span class="rl-price__currency">EUR</span>
        89.00
      </span>
    </p>
  </div>
</div>
