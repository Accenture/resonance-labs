<div class="rl-dropdown" data-dropdown>
  <span id="drp-label" class="rl-dropdown__label">Select a city</span>

  <div
    id="drp-trigger"
    class="rl-dropdown__trigger"
    role="combobox"
    aria-haspopup="listbox"
    aria-labelledby="drp-label"
    aria-controls="drp-listbox"
    aria-expanded="false"
    aria-activedescendant=""
    tabindex="0"
  >
    <span class="rl-dropdown__value" data-value>Select…</span>
    <img class="rl-dropdown__icon" src="../../assets/images/chevron-down.svg" alt="" width="20" height="20" aria-hidden="true" />
  </div>

  <ul
    id="drp-listbox"
    class="rl-dropdown__listbox"
    role="listbox"
    aria-labelledby="drp-label"
    hidden
  >
    <li id="opt-ott" role="option" class="rl-dropdown__option" aria-selected="false">Ottawa</li>
    <li id="opt-mon" role="option" class="rl-dropdown__option" aria-selected="false">Montreal</li>
    <li id="opt-tor" role="option" class="rl-dropdown__option" aria-selected="false">Toronto</li>
  </ul>

  <p class="rl-dropdown__help" id="drp-help">Use Arrow keys to move, Enter/Space to select, Escape to close.</p>
</div>
