<!-- Wishlist Button component -->
<section class="rlb-wishlist-demo" aria-label="Wishlist button examples">
  <h3>Icon-only variants</h3>
  <div class="rlb-wishlist-demo__row">
    <button
      class="rlb-wishlist-btn rlb-wishlist-btn--icon"
      type="button"
      aria-pressed="false"
      aria-label="Save Blue T-Shirt to wishlist"
      data-product="Blue T-Shirt"
    >
      <svg class="rlb-wishlist-btn__heart" aria-hidden="true" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
      </svg>
    </button>

    <button
      class="rlb-wishlist-btn rlb-wishlist-btn--icon"
      type="button"
      aria-pressed="true"
      aria-label="Remove Red Sneakers from wishlist"
      data-product="Red Sneakers"
    >
      <svg class="rlb-wishlist-btn__heart" aria-hidden="true" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
      </svg>
    </button>

    <button
      class="rlb-wishlist-btn rlb-wishlist-btn--icon"
      type="button"
      aria-pressed="false"
      aria-label="Save Green Jacket to wishlist"
      data-product="Green Jacket"
    >
      <svg class="rlb-wishlist-btn__heart" aria-hidden="true" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
      </svg>
    </button>
  </div>

  <h3>Text variants</h3>
  <div class="rlb-wishlist-demo__row">
    <button
      class="rlb-wishlist-btn rlb-wishlist-btn--text"
      type="button"
      aria-pressed="false"
      data-product="Blue T-Shirt"
    >
      <svg class="rlb-wishlist-btn__heart" aria-hidden="true" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
      </svg>
      <span class="rlb-wishlist-btn__label">Save to wishlist</span>
    </button>

    <button
      class="rlb-wishlist-btn rlb-wishlist-btn--text"
      type="button"
      aria-pressed="true"
      data-product="Red Sneakers"
    >
      <svg class="rlb-wishlist-btn__heart" aria-hidden="true" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
      </svg>
      <span class="rlb-wishlist-btn__label">Saved to wishlist</span>
    </button>

    <button
      class="rlb-wishlist-btn rlb-wishlist-btn--text"
      type="button"
      aria-pressed="false"
      data-product="Green Jacket"
    >
      <svg class="rlb-wishlist-btn__heart" aria-hidden="true" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
      </svg>
      <span class="rlb-wishlist-btn__label">Save to wishlist</span>
    </button>
  </div>
</section>
