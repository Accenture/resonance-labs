<div class="rlb-field">
  <label for="password-input-toggle-password">Password <span aria-hidden="true">*</span></label>
  <div class="rlb-pw">
    <input id="password-input-toggle-password" name="password" type="password" required aria-describedby="password-input-toggle-help" />
    <button type="button" id="password-input-toggle-toggle" class="rlb-pw__toggle" aria-pressed="false" aria-label="Show password">Show</button>
  </div>
  <p id="password-input-toggle-help" class="rlb-help">Required</p>
  <div id="password-input-toggle-live" class="rlb-sr-only" aria-live="polite"></div>
</div>
