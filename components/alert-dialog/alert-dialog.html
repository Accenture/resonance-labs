<div class="section">
  <section class="alert-dialog-demo" data-alert-dialog-demo>
    <button
      type="button"
      class="alert-dialog-trigger"
      id="alert-dialog-trigger"
      aria-haspopup="dialog"
      aria-controls="alert-dialog"
    >
      Delete Item
    </button>

    <div
      id="alert-dialog-overlay"
      class="alert-dialog-overlay"
      hidden
    >
      <div
        id="alert-dialog"
        role="alertdialog"
        aria-modal="true"
        aria-labelledby="alert-dialog-title"
        aria-describedby="alert-dialog-desc"
        class="alert-dialog-panel"
      >
        <h2 id="alert-dialog-title">Delete this item?</h2>
        <p id="alert-dialog-desc">
          This action is permanent and cannot be undone. All associated data will be removed immediately.
        </p>
        <div class="alert-dialog-actions">
          <button type="button" class="alert-dialog-btn alert-dialog-btn--cancel" data-alert-cancel>
            Cancel
          </button>
          <button type="button" class="alert-dialog-btn alert-dialog-btn--confirm" data-alert-confirm>
            Confirm Delete
          </button>
        </div>
      </div>
    </div>

    <p class="alert-dialog-status" id="alert-dialog-status" aria-live="polite"></p>
  </section>
</div>
