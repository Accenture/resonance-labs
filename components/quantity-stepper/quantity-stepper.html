<section class="quantity-steppers" aria-label="Product quantities">
  <div class="quantity-stepper__live-region" aria-live="polite" aria-atomic="true" data-stepper-announce></div>

  <!-- Stepper 1: Blue T-Shirt -->
  <div class="quantity-stepper" data-stepper data-min="1" data-max="10">
    <label class="quantity-stepper__label" id="stepper-label-1">Quantity for Blue T-Shirt</label>
    <div class="quantity-stepper__controls">
      <button
        type="button"
        class="quantity-stepper__btn quantity-stepper__btn--decrement"
        aria-label="Decrease quantity for Blue T-Shirt"
        aria-disabled="true"
        data-stepper-decrement
      >
        <span aria-hidden="true">&minus;</span>
      </button>
      <input
        type="number"
        class="quantity-stepper__input"
        value="1"
        min="1"
        max="10"
        step="1"
        aria-labelledby="stepper-label-1"
        aria-valuemin="1"
        aria-valuemax="10"
        aria-valuenow="1"
        data-stepper-input
      />
      <button
        type="button"
        class="quantity-stepper__btn quantity-stepper__btn--increment"
        aria-label="Increase quantity for Blue T-Shirt"
        data-stepper-increment
      >
        <span aria-hidden="true">&plus;</span>
      </button>
    </div>
  </div>

  <!-- Stepper 2: Red Sneakers -->
  <div class="quantity-stepper" data-stepper data-min="1" data-max="10">
    <label class="quantity-stepper__label" id="stepper-label-2">Quantity for Red Sneakers</label>
    <div class="quantity-stepper__controls">
      <button
        type="button"
        class="quantity-stepper__btn quantity-stepper__btn--decrement"
        aria-label="Decrease quantity for Red Sneakers"
        aria-disabled="true"
        data-stepper-decrement
      >
        <span aria-hidden="true">&minus;</span>
      </button>
      <input
        type="number"
        class="quantity-stepper__input"
        value="1"
        min="1"
        max="10"
        step="1"
        aria-labelledby="stepper-label-2"
        aria-valuemin="1"
        aria-valuemax="10"
        aria-valuenow="1"
        data-stepper-input
      />
      <button
        type="button"
        class="quantity-stepper__btn quantity-stepper__btn--increment"
        aria-label="Increase quantity for Red Sneakers"
        data-stepper-increment
      >
        <span aria-hidden="true">&plus;</span>
      </button>
    </div>
  </div>
</section>
