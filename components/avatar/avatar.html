<div class="section">
  <section class="rlb-avatar-demo" data-avatar-demo>
    <h3>Avatar with adjacent name (decorative image)</h3>
    <div class="rlb-avatar-row">
      <div class="rlb-avatar rlb-avatar--md">
        <img src="https://i.pravatar.cc/96?img=12" alt="" class="rlb-avatar__image" />
      </div>
      <span class="rlb-avatar-name">Maria Johnson</span>
    </div>

    <h3>Standalone avatar (informative image)</h3>
    <div class="rlb-avatar-row">
      <div class="rlb-avatar rlb-avatar--md">
        <img src="https://i.pravatar.cc/96?img=32" alt="Alex Chen" class="rlb-avatar__image" />
      </div>
    </div>

    <h3>Initials fallback</h3>
    <div class="rlb-avatar-row">
      <div class="rlb-avatar rlb-avatar--sm" aria-label="Tanya Rivera">
        <span class="rlb-avatar__initials" aria-hidden="true">TR</span>
      </div>
      <div class="rlb-avatar rlb-avatar--md" aria-label="David Kim">
        <span class="rlb-avatar__initials" aria-hidden="true">DK</span>
      </div>
      <div class="rlb-avatar rlb-avatar--lg" aria-label="Priya Gupta">
        <span class="rlb-avatar__initials" aria-hidden="true">PG</span>
      </div>
    </div>

    <h3>Avatar inside a link</h3>
    <div class="rlb-avatar-row">
      <a href="#profile" class="rlb-avatar-link">
        <div class="rlb-avatar rlb-avatar--md">
          <img src="https://i.pravatar.cc/96?img=47" alt="" role="presentation" class="rlb-avatar__image" />
        </div>
        <span>Sam Brooks</span>
      </a>
    </div>
  </section>
</div>
