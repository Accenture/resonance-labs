<div class="section">
  <section class="rl-alert-demo" data-alert-demo>
    <!-- Info alert -->
    <div class="rl-alert rl-alert--info" role="alert">
      <img class="rl-alert__icon" src="../../assets/images/alert-information.svg" alt="" width="20" height="20" aria-hidden="true" />
      <div class="rl-alert__content">
        <strong class="rl-alert__label">Info:</strong>
        <span class="rl-alert__message">Your session will expire in 10 minutes.</span>
      </div>
    </div>

    <!-- Success alert -->
    <div class="rl-alert rl-alert--success" role="alert">
      <img class="rl-alert__icon" src="../../assets/images/alert-success.svg" alt="" width="20" height="20" aria-hidden="true" />
      <div class="rl-alert__content">
        <strong class="rl-alert__label">Success:</strong>
        <span class="rl-alert__message">Your changes have been saved.</span>
      </div>
    </div>

    <!-- Warning alert -->
    <div class="rl-alert rl-alert--warning" role="alert">
      <img class="rl-alert__icon" src="../../assets/images/alert-warning.svg" alt="" width="20" height="20" aria-hidden="true" />
      <div class="rl-alert__content">
        <strong class="rl-alert__label">Warning:</strong>
        <span class="rl-alert__message">Some fields require your attention before continuing.</span>
      </div>
    </div>

    <!-- Error alert -->
    <div class="rl-alert rl-alert--error" role="alert">
      <img class="rl-alert__icon" src="../../assets/images/alert-error.svg" alt="" width="20" height="20" aria-hidden="true" />
      <div class="rl-alert__content">
        <strong class="rl-alert__label">Error:</strong>
        <span class="rl-alert__message">Unable to process your request. Please try again.</span>
      </div>
    </div>

    <!-- Dismissible alert variants -->
    <div class="rl-alert rl-alert--info rl-alert--dismissible" role="alert">
      <img class="rl-alert__icon" src="../../assets/images/alert-information.svg" alt="" width="20" height="20" aria-hidden="true" />
      <div class="rl-alert__content">
        <strong class="rl-alert__label">Info:</strong>
        <span class="rl-alert__message">This is a dismissible information alert.</span>
      </div>
      <button type="button" class="rl-alert__dismiss" aria-label="Dismiss info alert">
        <img src="../../assets/images/close.svg" alt="" width="16" height="16" aria-hidden="true" />
      </button>
    </div>

    <div class="rl-alert rl-alert--error rl-alert--dismissible" role="alert">
      <img class="rl-alert__icon" src="../../assets/images/alert-error.svg" alt="" width="20" height="20" aria-hidden="true" />
      <div class="rl-alert__content">
        <strong class="rl-alert__label">Error:</strong>
        <span class="rl-alert__message">This is a dismissible error alert.</span>
      </div>
      <button type="button" class="rl-alert__dismiss" aria-label="Dismiss error alert">
        <img src="../../assets/images/close.svg" alt="" width="16" height="16" aria-hidden="true" />
      </button>
    </div>

    <!-- Trigger button to demonstrate dynamic live region behavior -->
    <button
      class="btn rl-alert-demo__trigger"
      type="button"
      data-action="trigger-alert"
    >
      Trigger Dynamic Alert
    </button>

    <!-- Live region container for dynamically injected alerts -->
    <div class="rl-alert-demo__live-region" data-live-region></div>
  </section>
</div>
