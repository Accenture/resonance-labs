<!--
  Component-only reference
  Conforms to:
    - WAI-ARIA alert role (implicit aria-live="assertive")
    - Colour alone does not convey purpose — each alert uses icon + text label
    - Content is programmatically determinable
    - Does not require user interaction to be announced
    - Does not move keyboard focus when it appears
-->
<div class="section">
  <section class="alert-demo" data-alert-demo>
    <!-- Info alert -->
    <div class="alert alert--info" role="alert">
      <span class="alert__icon" aria-hidden="true">&#9432;</span>
      <div class="alert__content">
        <strong class="alert__label">Info:</strong>
        <span class="alert__message">Your session will expire in 10 minutes.</span>
      </div>
    </div>

    <!-- Success alert -->
    <div class="alert alert--success" role="alert">
      <span class="alert__icon" aria-hidden="true">&#10003;</span>
      <div class="alert__content">
        <strong class="alert__label">Success:</strong>
        <span class="alert__message">Your changes have been saved.</span>
      </div>
    </div>

    <!-- Error alert -->
    <div class="alert alert--error" role="alert">
      <span class="alert__icon" aria-hidden="true">&#10007;</span>
      <div class="alert__content">
        <strong class="alert__label">Error:</strong>
        <span class="alert__message">Unable to process your request. Please try again.</span>
      </div>
    </div>

    <!-- Trigger button to demonstrate dynamic live region behavior -->
    <button
      class="btn alert-demo__trigger"
      type="button"
      data-action="trigger-alert"
    >
      Trigger Dynamic Alert
    </button>

    <!-- Live region container for dynamically injected alerts -->
    <div class="alert-demo__live-region" data-live-region></div>
  </section>
</div>
