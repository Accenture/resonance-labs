<!-- Mini Cart Component -->
<section class="rlb-mini-cart" aria-label="Mini cart">
  <div class="rlb-mini-cart__header-bar">
    <span class="rlb-mini-cart__brand">Demo Store</span>
    <button
      type="button"
      class="rlb-mini-cart__trigger"
      aria-expanded="false"
      aria-controls="mini-cart-panel"
    >
      <svg class="rlb-mini-cart__icon" aria-hidden="true" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"></circle>
        <circle cx="20" cy="21" r="1"></circle>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
      </svg>
      Cart, <span class="rlb-mini-cart__count">3</span> items
    </button>
  </div>

  <div
    id="mini-cart-panel"
    class="rlb-mini-cart__panel"
    hidden
  >
    <h3 class="rlb-mini-cart__panel-heading">Your Cart</h3>

    <ul class="rlb-mini-cart__items" aria-label="Cart items">
      <li class="rlb-mini-cart__item" data-name="Blue T-Shirt" data-price="29.99" data-qty="1">
        <div class="rlb-mini-cart__item-details">
          <span class="rlb-mini-cart__item-name">Blue T-Shirt</span>
          <span class="rlb-mini-cart__item-meta">Qty: <span class="rlb-mini-cart__item-qty">1</span> &mdash; <span class="rlb-mini-cart__item-price">$29.99</span></span>
        </div>
        <button type="button" class="rlb-mini-cart__remove" aria-label="Remove Blue T-Shirt">
          <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </li>
      <li class="rlb-mini-cart__item" data-name="Black Running Shoes" data-price="89.95" data-qty="2">
        <div class="rlb-mini-cart__item-details">
          <span class="rlb-mini-cart__item-name">Black Running Shoes</span>
          <span class="rlb-mini-cart__item-meta">Qty: <span class="rlb-mini-cart__item-qty">2</span> &mdash; <span class="rlb-mini-cart__item-price">$179.90</span></span>
        </div>
        <button type="button" class="rlb-mini-cart__remove" aria-label="Remove Black Running Shoes">
          <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </li>
      <li class="rlb-mini-cart__item" data-name="Wool Beanie" data-price="18.50" data-qty="1">
        <div class="rlb-mini-cart__item-details">
          <span class="rlb-mini-cart__item-name">Wool Beanie</span>
          <span class="rlb-mini-cart__item-meta">Qty: <span class="rlb-mini-cart__item-qty">1</span> &mdash; <span class="rlb-mini-cart__item-price">$18.50</span></span>
        </div>
        <button type="button" class="rlb-mini-cart__remove" aria-label="Remove Wool Beanie">
          <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </li>
    </ul>

    <div class="rlb-mini-cart__empty" hidden>
      <p>Your cart is empty.</p>
    </div>

    <div class="rlb-mini-cart__subtotal">
      <span>Subtotal:</span>
      <span class="rlb-mini-cart__subtotal-value">$228.39</span>
    </div>

    <div class="rlb-mini-cart__actions">
      <a href="#" class="rlb-mini-cart__action rlb-mini-cart__action--view" aria-label="View full cart">View Cart</a>
      <a href="#" class="rlb-mini-cart__action rlb-mini-cart__action--checkout" aria-label="Proceed to checkout">Checkout</a>
    </div>
  </div>

  <div class="rlb-mini-cart__live" aria-live="polite" aria-atomic="true"></div>
</section>
