<div class="section">
  <section class="rlb-popover-demo" data-popover-demo>
    <h3>Text-Only Popover</h3>
    <div class="rlb-popover-wrapper">
      <button
        class="rlb-popover-trigger"
        aria-expanded="false"
        aria-controls="popover-info"
        type="button"
      >
        More Info
      </button>
      <div class="rlb-popover-panel" id="popover-info" role="region" hidden>
        <div class="rlb-popover-arrow"></div>
        <div class="rlb-popover-content">
          <p>This popover contains informational text only. Background content remains fully operable while this panel is open.</p>
        </div>
      </div>
    </div>

    <h3>Interactive Popover</h3>
    <div class="rlb-popover-wrapper">
      <button
        class="rlb-popover-trigger"
        aria-expanded="false"
        aria-controls="popover-actions"
        type="button"
      >
        Actions
      </button>
      <div class="rlb-popover-panel rlb-popover-panel--interactive" id="popover-actions" role="region" hidden>
        <div class="rlb-popover-arrow"></div>
        <div class="rlb-popover-content">
          <p>Choose an action below:</p>
          <ul class="rlb-popover-links">
            <li><a href="#edit">Edit item</a></li>
            <li><a href="#duplicate">Duplicate item</a></li>
          </ul>
          <button class="rlb-popover-action-btn" type="button">Delete item</button>
        </div>
      </div>
    </div>
  </section>
</div>
