<section aria-label="Product Variants">
  <div class="rlb-variant-selector">

    <!-- Size Group -->
    <fieldset class="rlb-variant-selector__group">
      <legend class="rlb-variant-selector__label">Size</legend>
      <div class="rlb-variant-selector__options" role="radiogroup" aria-label="Size">
        <span class="rlb-variant-selector__option" role="radio" aria-checked="false" tabindex="0" data-value="S">
          S
        </span>
        <span class="rlb-variant-selector__option" role="radio" aria-checked="false" tabindex="-1" data-value="M">
          M
        </span>
        <span class="rlb-variant-selector__option" role="radio" aria-checked="false" tabindex="-1" data-value="L">
          L
        </span>
        <span class="rlb-variant-selector__option rlb-variant-selector__option--disabled" role="radio" aria-checked="false" aria-disabled="true" tabindex="-1" data-value="XL">
          <span class="rlb-variant-selector__option-label">XL</span>
          <span class="rlb-variant-selector__option-stock">Out of stock</span>
        </span>
      </div>
    </fieldset>

    <!-- Color Group -->
    <fieldset class="rlb-variant-selector__group">
      <legend class="rlb-variant-selector__label">Color</legend>
      <div class="rlb-variant-selector__options" role="radiogroup" aria-label="Color">
        <span class="rlb-variant-selector__option rlb-variant-selector__option--swatch" role="radio" aria-checked="false" tabindex="0" data-value="Black">
          <span class="rlb-variant-selector__swatch" style="background-color: #1a1a1a;" aria-hidden="true"></span>
          <span class="rlb-variant-selector__color-name">Black</span>
        </span>
        <span class="rlb-variant-selector__option rlb-variant-selector__option--swatch" role="radio" aria-checked="false" tabindex="-1" data-value="Blue">
          <span class="rlb-variant-selector__swatch" style="background-color: #0b57d0;" aria-hidden="true"></span>
          <span class="rlb-variant-selector__color-name">Blue</span>
        </span>
        <span class="rlb-variant-selector__option rlb-variant-selector__option--swatch rlb-variant-selector__option--disabled" role="radio" aria-checked="false" aria-disabled="true" tabindex="-1" data-value="Red">
          <span class="rlb-variant-selector__swatch" style="background-color: #c5221f;" aria-hidden="true"></span>
          <span class="rlb-variant-selector__color-name">Red</span>
          <span class="rlb-variant-selector__option-stock">Out of stock</span>
        </span>
      </div>
    </fieldset>

  </div>

  <div class="rlb-variant-selector__live-region" aria-live="polite" aria-atomic="true"></div>
</section>
